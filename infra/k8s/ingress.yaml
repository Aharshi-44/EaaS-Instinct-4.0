apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: energix-ingress
  namespace: energix
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.energix.com
        - app.energix.com
      secretName: energix-tls
  rules:
    - host: api.energix.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kong
                port:
                  number: 8000
    - host: app.energix.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
